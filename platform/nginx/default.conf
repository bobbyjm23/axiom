# Nginx reverse proxy for AnythingLLM
# TLS: place fullchain.pem + privkey.pem in platform/nginx/certs/ and enable TLS block

upstream anythingllm_backend {
    server anythingllm:3001;
    keepalive 32;
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # Agent invocation requires WebSocket
    location ~* ^/api/agent-invocation/(.*) {
        proxy_pass http://anythingllm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://anythingllm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running LLM streams
        proxy_connect_timeout 605s;
        proxy_send_timeout 605s;
        proxy_read_timeout 605s;
        send_timeout 605s;
        keepalive_timeout 605s;

        # Disable buffering for SSE/streaming responses
        proxy_buffering off;
        proxy_cache off;

        # WebSocket support for streaming chat
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

