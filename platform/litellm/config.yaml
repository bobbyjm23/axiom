model_list:
  # POC profile — Google Gemini via API
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: chat

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: chat

  # Embeddings for RAG (Gemini — text-embedding-004 was retired Jan 2026)
  - model_name: gemini-embedding-001
    litellm_params:
      model: gemini/gemini-embedding-001
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: embedding

  # Backward-compatible alias for existing EMBEDDING_MODEL_PREF values
  - model_name: text-embedding-004
    litellm_params:
      model: gemini/gemini-embedding-001
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      mode: embedding

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  fallbacks:
    - gemini-pro: [gemini-flash]

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
