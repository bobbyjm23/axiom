# On-prem LiteLLM model routing — use with docker-compose.onprem.yml
# Copy or merge into config.yaml when switching profiles

model_list:
  - model_name: llama3-enterprise
    litellm_params:
      model: openai/llama-3.3-70b-instruct
      api_base: http://vllm:8000/v1
      api_key: none
    model_info:
      mode: chat

  - model_name: llama3-fast
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434
    model_info:
      mode: chat

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434
    model_info:
      mode: embedding

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 300
  fallbacks:
    - llama3-enterprise: [llama3-fast]

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
