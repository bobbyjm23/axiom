apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: sovereign-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              value: postgresql://sovereign:$(POSTGRES_PASSWORD)@postgres.sovereign-app.svc.cluster.local:5432/sovereign_ai
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: sovereign-secrets
                  key: LITELLM_MASTER_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sovereign-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: sovereign-app
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
