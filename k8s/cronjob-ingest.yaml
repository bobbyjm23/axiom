apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest-sharepoint
  namespace: sovereign-warden-app
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: ingest
              image: python:3.12-slim
              command: ["python", "-m", "sharepoint.sync", "--workspace", "company-knowledge"]
              workingDir: /app/ingest
              envFrom:
                - secretRef:
                    name: sovereign-ingest-secrets
              volumeMounts:
                - name: ingest-code
                  mountPath: /app/ingest
          volumes:
            - name: ingest-code
              configMap:
                name: ingest-scripts
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest-confluence
  namespace: sovereign-warden-app
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: ingest
              image: python:3.12-slim
              command: ["python", "-m", "confluence.sync", "--workspace", "company-knowledge", "--space", "HR"]
              workingDir: /app/ingest
              envFrom:
                - secretRef:
                    name: sovereign-ingest-secrets
              volumeMounts:
                - name: ingest-code
                  mountPath: /app/ingest
          volumes:
            - name: ingest-code
              configMap:
                name: ingest-scripts
          restartPolicy: OnFailure
