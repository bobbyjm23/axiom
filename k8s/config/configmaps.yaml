apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: sovereign-warden-app
data:
  config.yaml: |
    model_list:
      - model_name: llama3-enterprise
        litellm_params:
          model: openai/llama-3.3-70b-instruct
          api_base: http://vllm.sovereign-warden-gpu.svc.cluster.local:8000/v1
          api_key: none
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama.sovereign-warden-gpu.svc.cluster.local:11434
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: sovereign-warden-edge
data:
  default.conf: |
    upstream anythingllm {
        server anythingllm.sovereign-warden-app.svc.cluster.local:3001;
        keepalive 32;
    }
    server {
        listen 80;
        client_max_body_size 100M;
        location ~* ^/api/agent-invocation/(.*) {
            proxy_pass http://anythingllm;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 600s;
        }
        location / {
            proxy_pass http://anythingllm;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 605s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
