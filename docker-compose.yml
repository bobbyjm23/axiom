# Sovereign AI Platform — POC Docker Compose stack
# Usage: docker compose --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: sovereign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovereign-net

  redis:
    image: redis:7-alpine
    container_name: sovereign-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovereign-net

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: sovereign-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    volumes:
      - ./platform/litellm/config.yaml:/app/config.yaml:ro
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sovereign-net

  anythingllm:
    image: ${ANYTHINGLLM_IMAGE:-mintplexlabs/anythingllm:latest}
    container_name: sovereign-anythingllm
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      SERVER_PORT: "3001"
      STORAGE_DIR: /app/server/storage
      DISABLE_TELEMETRY: ${DISABLE_TELEMETRY:-true}
      JWT_SECRET: ${JWT_SECRET}
      SIG_KEY: ${SIG_KEY}
      SIG_SALT: ${SIG_SALT}
      UID: ${ANYTHINGLLM_UID:-1000}
      GID: ${ANYTHINGLLM_GID:-1000}
      LLM_PROVIDER: ${LLM_PROVIDER}
      GENERIC_OPEN_AI_BASE_PATH: ${GENERIC_OPEN_AI_BASE_PATH}
      GENERIC_OPEN_AI_MODEL_PREF: ${GENERIC_OPEN_AI_MODEL_PREF}
      GENERIC_OPEN_AI_API_KEY: ${GENERIC_OPEN_AI_API_KEY}
      EMBEDDING_ENGINE: ${EMBEDDING_ENGINE}
      EMBEDDING_BASE_PATH: ${EMBEDDING_BASE_PATH}
      EMBEDDING_MODEL_PREF: ${EMBEDDING_MODEL_PREF}
      EMBEDDING_MODEL_MAX_CHUNK_LENGTH: ${EMBEDDING_MODEL_MAX_CHUNK_LENGTH:-8192}
      GENERIC_OPEN_AI_EMBEDDING_API_KEY: ${GENERIC_OPEN_AI_EMBEDDING_API_KEY:-}
      VECTOR_DB: qdrant
      QDRANT_ENDPOINT: ${QDRANT_ENDPOINT}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      PASSWORDMINCHAR: "8"
    volumes:
      - anythingllm_storage:/app/server/storage
      - ./platform/anythingllm/.env.example:/app/server/.env:ro
    ports:
      - "3002:3001"
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - sovereign-net

  nginx:
    image: nginx:1.27-alpine
    container_name: sovereign-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-3000}:80"
      - "${NGINX_HTTPS_PORT:-3443}:443"
    volumes:
      - ./platform/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./platform/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - anythingllm
    networks:
      - sovereign-net

  langfuse:
    image: langfuse/langfuse:2
    container_name: sovereign-langfuse
    restart: unless-stopped
    profiles:
      - observability
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change_me_langfuse_secret_32chars}
      SALT: ${LANGFUSE_SALT:-change_me_langfuse_salt}
      NEXTAUTH_URL: http://localhost:3100
      TELEMETRY_ENABLED: "false"
    ports:
      - "3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sovereign-net

volumes:
  postgres_data:
  redis_data:
  anythingllm_storage:

networks:
  sovereign-net:
    driver: bridge
